# GitHub Actions for ServerMind Docker Build

name: Docker Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/servermind:${{ github.sha }}
          ${{ startsWith(github.ref, 'refs/tags/') && format('{0}/servermind:{1}', secrets.DOCKERHUB_USERNAME, github.ref_name) || '' }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/servermind:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/servermind:buildcache,mode=max

    - name: Build (PR)
      if: github.event_name == 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: servermind:pr-${{ github.event.number }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/servermind:buildcache
